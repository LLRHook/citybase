name: CI

# Least-privilege token: this workflow only reads code; no PR/issue writes.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # actions are pinned to commit SHAs (not version tags) for supply-chain safety.
      # Dependabot bumps the SHAs; the # comment after each SHA tracks the version.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run

  # Desktop smoke (FEAT-001): boots the real Electron app under xvfb and proves
  # the main → preload → renderer glue, then packages an unpacked dir so a broken
  # main entry, preload path, or files glob can't ship green.
  desktop-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: xvfb-run -a npm run test:e2e
      - run: npx electron-builder --dir
